name: gpr-phenology
channels:
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.11

  # Google Earth Engine
  - earthengine-api>=0.1.380

  # Geoespacial
  - geemap>=0.30.0
  - rasterio>=1.3.9
  - geopandas>=0.14.0
  - shapely>=2.0.0
  - pyproj>=3.6.0
  - fiona>=1.9.0

  # Datos y análisis
  - numpy>=1.26.0
  - pandas>=2.1.0
  - scipy>=1.11.0
  - scikit-learn>=1.3.0
  - xarray>=2023.10.0

  # Visualización
  - matplotlib>=3.8.0
  - seaborn>=0.13.0
  - plotly>=5.18.0

  # Jupyter
  - jupyterlab>=4.0.0
  - ipywidgets>=8.1.0
  - ipykernel>=6.26.0

  # Utilidades
  - tqdm>=4.66.0
  - pyyaml>=6.0.1
  - pip

  - pip:
      # Por si alguna librería no está en conda-forge
      - geemap
      - earthengine-api
